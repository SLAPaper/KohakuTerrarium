# Drop-in for kohakuterrarium-host.service / kohakuterrarium-all.service
# that adds the four-layer ``[auth]`` config via systemd credentials.
#
# Install:
#   sudo mkdir -p /etc/systemd/system/kohakuterrarium-host.service.d
#   sudo cp auth-secrets.example.conf \
#       /etc/systemd/system/kohakuterrarium-host.service.d/auth.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart kohakuterrarium-host
#
# Provision the credential files (owned root:root, mode 0400):
#   sudo mkdir -p /etc/kohakuterrarium/credentials
#   sudo install -m 0400 /dev/stdin /etc/kohakuterrarium/credentials/host_token \
#       <<< "$(python -c 'import secrets;print(secrets.token_hex(32))')"
#   sudo install -m 0400 /dev/stdin /etc/kohakuterrarium/credentials/admin_token \
#       <<< "$(python -c 'import secrets;print(secrets.token_hex(32))')"
#
# Then create the first admin user (interactive password prompt):
#   sudo -u kohakuterrarium-host kt admin users add operator --role admin
#
# This file is intentionally a DROP-IN rather than baked into the main
# unit template — operators decide per deployment whether to enable
# auth, and rolling it out is one file swap + restart.

[Service]
# LoadCredential= reads the file at unit start and exposes its contents
# under %d/<name> (the runtime credential directory).  The file never
# touches the unit's environment block.
LoadCredential=host_token:/etc/kohakuterrarium/credentials/host_token
LoadCredential=admin_token:/etc/kohakuterrarium/credentials/admin_token

# Point the auth config loader at the credential paths.  ``*_FILE``
# variants of every secret-bearing env var read the file's first
# nonempty line.
Environment=KT_AUTH_HOST_TOKEN_FILE=%d/host_token
Environment=KT_AUTH_ADMIN_TOKEN_FILE=%d/admin_token

# Multi-user mode.  See docs/{en,zh-CN,zh-TW}/guides/authentication.md
# for the full model and the ``kt admin`` operator surface.
Environment=KT_AUTH_MULTI_USER=required
Environment=KT_AUTH_REGISTRATION=invite_only

# Disable loopback bypass on production hosts (a reverse proxy
# forwards from loopback; treating loopback as trusted there means
# bypassing L2 for every proxied request).
Environment=KT_AUTH_LOOPBACK_BYPASS=0
