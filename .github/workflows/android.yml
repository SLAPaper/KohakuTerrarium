name: Android

# Builds the Android APK + AAB.
#
# Two trigger modes:
#   * On tag push (``v*``) → builds + signs + uploads to the matching
#     GitHub Release.  Same release artifact stream as
#     ``release.yml``'s desktop builds.
#   * On workflow_dispatch → builds unsigned APK for verification.
#     The sandbox-fetch + briefcase build + test passes still run.
#
# CI-bundled-sandbox flow (the headline of this workflow):
#   1. Set up Python + Briefcase Android prerequisites (JDK, Android SDK)
#   2. Run ``packaging/android/fetch_sandbox.py`` to download
#      busybox (the only bundled binary; see design.md §4) per the
#      manifest + verify SHA256.  Cached across runs.
#   3. ``briefcase build android`` — Briefcase packs Python + framework
#      + Vue web_dist + the sandbox bin dir into the APK.
#   4. (Tag only) Sign the AAB + APK with the release keystore.
#   5. Upload artifacts to the GitHub release.
#
# Sandbox binaries are NEVER committed to git — only the
# ``sandbox_manifest.toml`` (pinned versions + SHA256) is committed.
# CI populates ``packaging/android/bin/`` on every run.

on:
  push:
    tags: ["v*"]
  pull_request:
    # PRs only run the lightweight ``validate-manifest`` job below
    # (the full Briefcase build is slow + needs Android SDK + NDK
    # downloads).  The ``build`` job is gated to tags + dispatch.
    paths:
      - "packaging/android/**"
      - ".github/workflows/android.yml"
      - "src/kohakuterrarium/utils/mobile_sandbox.py"
      - "src/kohakuterrarium/builtins/tools/bash.py"
      - "tests/unit/packaging/**"
      - "tests/unit/utils/test_mobile_sandbox.py"
  workflow_dispatch:
    inputs:
      sign:
        description: "Sign the output APK/AAB (requires release secrets)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    # Heavy job: only on tag pushes + manual dispatch.  PRs hit the
    # ``validate-manifest`` job below which is ~1 minute vs the full
    # build's ~15-30 minutes.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Pin to the ``release`` environment so the signing secrets
    # (``ANDROID_KEYSTORE_*``, ``ANDROID_KEY_*``) read from
    # ``Settings → Environments → release → Environment secrets``
    # rather than repository-wide secrets.  Same environment the
    # PyPI publish job (``release.yml`` → ``publish-pypi``) uses, so
    # any branch-restriction / approval rule already configured
    # there applies to keystore access too.  Unsigned manual builds
    # (``workflow_dispatch`` without ``sign=true``) still run — the
    # ``Sign + package`` step short-circuits when the secrets aren't
    # present, so the environment association is a no-op for the
    # debug-APK path.
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up JDK 17
        # Briefcase Android currently builds against JDK 17 — newer
        # JDKs hit Gradle compatibility issues with the python-for-android
        # backend.  Pinned until that's resolved upstream.
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Briefcase + framework
        run: |
          python -m pip install --upgrade pip
          python -m pip install briefcase
          python -m pip install -e ".[dev]"

      - name: Cache sandbox-fetch downloads
        # The fetcher dedupes by SHA256-of-URL so re-runs are cache
        # hits.  Cache the dir between CI runs to avoid pulling
        # ~30MB of binaries every build.
        uses: actions/cache@v4
        with:
          path: ~/.cache/kohakuterrarium/android-sandbox
          key: sandbox-${{ hashFiles('packaging/android/sandbox_manifest.toml') }}
          restore-keys: |
            sandbox-

      - name: Fetch + verify sandbox binaries
        # ``sandbox_manifest.toml`` declares no binaries in the
        # current build (Android uses ``/system/bin/sh`` instead of
        # a bundled busybox — see ``bash.py`` mobile profile path).
        # The fetcher still runs as a no-op so the manifest contract
        # stays exercised; the ``ls`` only fires when binaries are
        # actually emitted, otherwise the empty-bin case would fail
        # the workflow with "No such file or directory".
        run: |
          python packaging/android/fetch_sandbox.py
          if compgen -G "packaging/android/bin/*/" > /dev/null; then
            ls -lh packaging/android/bin/*/
          else
            echo "no sandbox binaries declared — skipping listing"
          fi

      # KohakuVault Android wheels are NOT fetched locally; instead
      # ``packaging/android/postcreate.py::patch_android_requirements``
      # rewrites the generated ``app/requirements.txt`` to use direct
      # URL refs against KV's GitHub Releases.  This sidesteps the
      # ``--find-links wheels`` path-resolution problem: Chaquopy's
      # pip runs from ``<module>/build/python/env/<variant>/`` (a
      # dir that doesn't exist at postcreate time), so a relative
      # ``wheels`` path is unresolvable.  PEP 508 direct refs
      # download the wheel from the URL directly — no local
      # wheelhouse needed.

      - name: Build frontend
        # The framework's setup expects web_dist/ to exist; the
        # release pipeline normally builds it but the Android job
        # runs in isolation, so build here too.
        working-directory: src/kohakuterrarium-frontend
        run: |
          npm ci
          npm run build

      - name: Run sandbox + tool-catalog tests (sanity)
        run: |
          python -m pytest \
            tests/unit/utils/test_mobile_sandbox.py \
            tests/unit/builtins/test_tool_catalog_mobile.py \
            tests/unit/packaging/test_fetch_sandbox.py \
            -q

      - name: Briefcase create
        run: briefcase create android

      - name: Apply template overrides + sandbox assets
        # Briefcase Android has no native ``merge a tree into the
        # generated project`` mechanism, so we run a post-create
        # script between ``create`` and ``update`` that copies our
        # custom MainActivity / KohakuHostService into the
        # generated tree and mounts the busybox bin tree at
        # assets/sandbox/bin/.  See packaging/android/postcreate.py.
        run: python packaging/android/postcreate.py

      - name: Briefcase update + build
        # ``briefcase build`` produces the debug-keystore-signed
        # ``app-debug.apk`` under
        # ``build/.../gradle/app/build/outputs/apk/debug/`` (used
        # as the fallback when signing secrets aren't configured).
        # ``briefcase package -p {apk,aab}`` below runs the release
        # Gradle tasks (``assembleRelease`` / ``bundleRelease``)
        # and moves the UNSIGNED release artifact to ``dist/``.
        # Briefcase Android has zero signing surface — every flag
        # the older workflow tried (``--keystore`` / ``--key-alias``
        # / ``--keystore-pass`` / ``--key-pass``) is rejected by
        # the ``package android gradle`` argparser.  Signing is
        # done by ``apksigner`` (APK) + ``jarsigner`` (AAB) in the
        # ``Sign release artifacts`` step below.
        run: |
          briefcase update android
          briefcase build android

      - name: Package release (unsigned)
        # Always run for tag pushes + manual dispatches.  When the
        # signing secrets are absent the ``Sign release artifacts``
        # step below short-circuits and the unsigned APK / AAB still
        # land on the release for inspection.
        if: github.event_name == 'push' || inputs.sign
        run: |
          briefcase package android -p apk --adhoc-sign
          briefcase package android -p aab --adhoc-sign
          echo "=== dist/ after package ==="
          ls -la dist/ || true

      - name: Sign release artifacts
        if: github.event_name == 'push' || inputs.sign
        env:
          # Four secrets read from the ``release`` environment
          # (see ``environment: release`` on this job above).
          # When ``ANDROID_KEYSTORE_B64`` is empty the step
          # short-circuits with a warning and the unsigned artifact
          # from ``Package release`` is what gets uploaded.
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_B64}" ]; then
            echo "::warning::No signing secrets configured; uploading unsigned artifacts."
            exit 0
          fi
          echo "${ANDROID_KEYSTORE_B64}" | base64 -d > "${RUNNER_TEMP}/release.jks"

          # Pick the newest installed build-tools (apksigner +
          # zipalign live there).  ``sort -V | tail -1`` covers
          # alpha/beta version strings cleanly.
          BT_VER=$(ls "${ANDROID_HOME}/build-tools" | sort -V | tail -1)
          BT="${ANDROID_HOME}/build-tools/${BT_VER}"
          APKSIGNER="${BT}/apksigner"
          ZIPALIGN="${BT}/zipalign"
          echo "using build-tools ${BT_VER}"

          shopt -s nullglob
          # Sign every release APK Briefcase moved into dist/.
          # ``*.debug.apk`` is the Gradle-debug-keystore-signed
          # build from ``briefcase build`` — leave it alone, it's
          # already signed (re-signing it would just break it).
          for apk in dist/*.apk; do
            case "${apk}" in
              *.debug.apk) continue ;;
            esac
            base="${apk%.apk}"
            aligned="${base}-aligned.apk"
            signed="${base}-signed.apk"
            echo "zipalign + sign: ${apk}"
            "${ZIPALIGN}" -p -f 4 "${apk}" "${aligned}"
            "${APKSIGNER}" sign \
              --ks "${RUNNER_TEMP}/release.jks" \
              --ks-key-alias "${ANDROID_KEY_ALIAS}" \
              --ks-pass "env:ANDROID_KEYSTORE_PASSWORD" \
              --key-pass "env:ANDROID_KEY_PASSWORD" \
              --v1-signing-enabled true \
              --v2-signing-enabled true \
              --v3-signing-enabled true \
              --out "${signed}" \
              "${aligned}"
            "${APKSIGNER}" verify --verbose "${signed}"
            # Replace the unsigned dist/*.apk with the signed copy
            # so the rename + upload steps below pick up the
            # canonical file (and clean up intermediates).
            mv "${signed}" "${apk}"
            rm -f "${aligned}"
          done

          # AAB: apksigner can't handle bundles — use jarsigner.
          # Play App Signing (the recommended Play Store flow)
          # only needs the upload key on the AAB, which jarsigner
          # provides via v1 (JAR signing).  ``-storepass:env`` /
          # ``-keypass:env`` keep the secrets off the command line.
          for aab in dist/*.aab; do
            echo "jarsigner: ${aab}"
            jarsigner -keystore "${RUNNER_TEMP}/release.jks" \
              -storepass:env ANDROID_KEYSTORE_PASSWORD \
              -keypass:env ANDROID_KEY_PASSWORD \
              -sigalg SHA256withRSA -digestalg SHA-256 \
              "${aab}" "${ANDROID_KEY_ALIAS}"
            jarsigner -verify -verbose "${aab}" | tail -5
          done

          rm -f "${RUNNER_TEMP}/release.jks"
          echo "=== signed dist/ ==="
          ls -la dist/

      - name: Stage + rename artifacts
        # Two source roots:
        #
        #   * ``dist/*.{apk,aab}`` — Briefcase's release output.
        #     ``briefcase package android -p {apk,aab}`` moves the
        #     unsigned release artifact into ``dist/`` (Briefcase
        #     convention: ``<FormalName>-<version>.{apk,aab}``).
        #     The ``Sign release artifacts`` step above overwrites
        #     these in place with signed copies when secrets are
        #     present.
        #   * ``build/kohakuterrarium/android/**/app-debug.apk`` —
        #     the Gradle-debug-keystore-signed APK from
        #     ``briefcase build``.  Used as the FALLBACK when the
        #     release pipeline didn't run (unsigned PR / dispatch
        #     without ``sign=true``) so the workflow always
        #     uploads SOMETHING the user can sideload.
        #
        # Both get renamed into ``dist/android/`` as:
        #
        #     kohakuterrarium-<version>[-debug]-android.<ext>
        #
        # Version source: ``GITHUB_REF_NAME`` on tag push,
        # ``pyproject`` otherwise.  Debug builds keep the ``-debug``
        # suffix; release builds emit clean unsuffixed names.
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/android
          ref="${GITHUB_REF_NAME:-}"
          if [[ "${ref}" == v* ]]; then
            version="${ref#v}"
          else
            version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          shopt -s globstar nullglob
          copied=0

          # Release artifacts (Briefcase already moved them to dist/).
          # Skip our own staging subdir so re-runs don't re-process.
          release_apks=(dist/*.apk)
          release_aabs=(dist/*.aab)
          has_release=0
          for src in "${release_apks[@]}" "${release_aabs[@]}"; do
            [ -f "${src}" ] || continue
            has_release=1
            ext="${src##*.}"
            dest="dist/android/kohakuterrarium-${version}-android.${ext}"
            cp "${src}" "${dest}"
            echo "  release  ${src} -> ${dest}"
            copied=$((copied + 1))
          done

          # Fallback: debug APK from ``briefcase build`` when no
          # release artifact was emitted (unsigned dispatch run).
          if [ "${has_release}" -eq 0 ]; then
            for src in build/kohakuterrarium/android/**/*.apk; do
              [ -f "${src}" ] || continue
              base=$(basename "${src}")
              # Only pick the Gradle ``app-debug.apk`` — Briefcase's
              # own intermediate APKs under app/build/ are not
              # standalone-installable.
              [[ "${base}" == *debug* ]] || continue
              dest="dist/android/kohakuterrarium-${version}-debug-android.apk"
              cp "${src}" "${dest}"
              echo "  debug    ${src} -> ${dest}"
              copied=$((copied + 1))
              break
            done
          fi

          if [ "${copied}" -eq 0 ]; then
            echo "::warning::no APK/AAB found under dist/ or build/"
          fi
          ls -la dist/android/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ steps.stage.outputs.version }}-${{ github.sha }}
          path: dist/android/*
          if-no-files-found: warn
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/android/*
          fail_on_unmatched_files: false

  validate-manifest:
    # Runs on every PR + every push to catch manifest schema mistakes
    # without waiting for the slow full-build job.  No JDK / NDK /
    # Briefcase needed — just Python + pytest (no framework install
    # required; the fetcher + postcreate scripts are stdlib-only).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pytest
        # The fetcher / postcreate scripts use only stdlib (tomllib,
        # urllib, shutil, re), so we don't need the framework wheel —
        # just pytest itself.  Quick install (~2s) beats a full
        # ``pip install -e ".[dev]"`` which would drag in fastapi /
        # uvicorn / etc. for no reason.
        run: python -m pip install --quiet pytest
      - name: Validate sandbox manifest schema + postcreate logic
        run: python -m pytest tests/unit/packaging/ -q
